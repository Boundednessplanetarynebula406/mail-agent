name: Feature request
description: Propose a new workflow, provider, or improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is blocked or awkward today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Include provider, mailbox shape, or Codex workflow details if they matter.
